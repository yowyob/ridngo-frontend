name: Publish Docker image (GHCR)
on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**"]
  repository_dispatch:
    types: [mirror-updated]
  workflow_dispatch:
jobs:
  build:
    if: github.repository == 'yowyob/ridngo-frontend'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: |
          REPO="${GITHUB_REPOSITORY,,}"
          echo "image=ghcr.io/${REPO}" >> "$GITHUB_OUTPUT"
          echo "sha=sha-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://ridngo.yowyob.com/ride-api
            NEXT_PUBLIC_VEHICLE_API_BASE_URL=https://traefikdev.yowyob.com/vehicule
            NEXT_PUBLIC_OSM_BASE_URL=https://nominatim.openstreetmap.org
            NEXT_PUBLIC_COMPLIANCE_URL=https://ugate-compliance-callback.vercel.app
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.image }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
