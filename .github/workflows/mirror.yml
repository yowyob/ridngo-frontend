name: Mirror from source

on:
  repository_dispatch:
    types: [upstream-push]
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

concurrency:
  group: mirror-ridngo-frontend
  cancel-in-progress: true

jobs:
  mirror:
    if: github.repository == 'yowyob/ridngo-frontend'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write
    env:
      UPSTREAM: https://github.com/JerMa25/Ridngo.git
      UPSTREAM_BRANCH: main
      SOURCE_SUBDIR: ridngo-frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync frontend from upstream monorepo
        env:
          MIRROR_PUSH_TOKEN: ${{ secrets.UPSTREAM_TOKEN || github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          git clone --depth 1 --branch "$UPSTREAM_BRANCH" "$UPSTREAM" "$workdir/upstream"
          rsync -a --delete \
            --exclude .git \
            --exclude .github \
            --exclude docker-compose.prod.yml \
            "$workdir/upstream/$SOURCE_SUBDIR/" ./

          git config user.name "yowyob-mirror"
          git config user.email "mirror@yowyob.local"
          git add -A
          if git diff --cached --quiet; then
            echo "no change"
            exit 0
          fi

          git commit -m "mirror: sync JerMa25/Ridngo@$UPSTREAM_BRANCH frontend"
          git push "https://x-access-token:${MIRROR_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          gh api -X POST "repos/${GITHUB_REPOSITORY}/dispatches" -f event_type=mirror-updated
